name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"] # Se ejecuta automáticamente al subir cambios a la rama main

# Permisos necesarios para interactuar con el motor de GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se acumulen ejecuciones colgadas si haces varios pushes seguidos
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # 🎯 AQUÍ LE DECIMOS A GITHUB QUE EL ROOT ES LA CARPETA FRONTEND
    defaults:
      run:
        working-directory: ./frontend # ⚠️ Si tu carpeta se llama diferente, cámbiala aquí. Si está en la raíz pura, borra estas 3 líneas de "defaults".

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Optimiza el tiempo de instalación guardando la caché

      - name: Install dependencies
        run: npm ci # "npm ci" es más rápido y seguro para entornos de producción/servidores

      - name: Build application
        run: npm run build

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Le indicamos la ruta exacta del compilado final generado por Vite
          path: './frontend/dist' # ⚠️ Si borraste el "defaults" arriba, aquí debes dejarlo solo como './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
